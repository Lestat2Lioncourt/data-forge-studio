site_name: DataForge Studio - Manuel Utilisateur
site_description: Manuel utilisateur de DataForge Studio - Outil de gestion multi-bases de données
site_author: Lestat2Lioncourt

docs_dir: docs/manual
site_dir: docs/site

theme:
  name: material
  language: fr
  palette:
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Mode clair
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Mode sombre
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  logo: assets/logo.png
  favicon: assets/logo.png
  font:
    text: Roboto
    code: Roboto Mono

nav:
  - Accueil: README.md
  - Démarrage rapide: 01-quick-start.md
  - Explorer une base: 02-explore-database.md
  - Multi-projets: 03-multi-projects.md
  - Requêtes multi-onglets: 04-compare-data.md
  - Arborescence de fichiers: 05-data-files.md
  - Requêtes SQL: 06-format-queries.md
  - Accès FTP: 07-ftp-access.md
  - Personnalisation: 08-customize.md
  - Référence rapide: 09-reference.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - attr_list
  - md_in_html
  - toc:
      permalink: true

use_directory_urls: false

plugins:
  - search:
      lang: fr

extra:
  generator: false
